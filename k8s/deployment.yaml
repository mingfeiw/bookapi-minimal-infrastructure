apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bookapi
  template:
    metadata:
      labels:
        app: bookapi
    spec:
      containers:
      - name: bookapi
        image: acrbookapi.azurecr.io/bookapi-minimal:latest
        ports:
        - containerPort: 80
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bookapi-secret
              key: DbPassword
        - name: APIKEY
          valueFrom:
            secretKeyRef:
              name: bookapi-secret
              key: APIKEY